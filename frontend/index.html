<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Namescape · Istanbul</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <aside id="sidebar">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark"></div>
        <div>
          <h1>Namescape</h1>
          <p class="sub">Linguistic landscape of Istanbul · per-district keyword presence from OSM</p>
        </div>
      </div>
    </header>

    <div class="card">
      <div class="card-title">Keywords</div>
      <textarea id="keywords" rows="4" placeholder="kitap&#10;kafe&#10;çay"></textarea>
      <div class="hint">one per line · diacritics optional</div>
    </div>

    <div class="card">
      <div class="card-title">Matching</div>
      <div class="segmented" id="mode-seg">
        <label><input type="radio" name="mode" value="substring" /><span>substring</span></label>
        <label><input type="radio" name="mode" value="stemmed" checked /><span>stemmed</span></label>
        <label><input type="radio" name="mode" value="regex" /><span>regex</span></label>
      </div>
      <div id="mode-hint" class="hint"></div>
    </div>

    <div class="card">
      <div class="card-title">Appearance</div>
      <label class="field-label">Palette</label>
      <select id="palette"></select>
      <label class="field-label" style="margin-top:10px">Color scale</label>
      <div class="segmented" id="scale-seg">
        <label><input type="radio" name="scale" value="auto" checked /><span>auto · 0→max</span></label>
        <label><input type="radio" name="scale" value="absolute" /><span>0→100%</span></label>
      </div>
      <div class="hint">auto: stretches the palette to the maximum fraction in the current result.</div>
    </div>

    <div class="card">
      <div class="card-title row">
        Location types
        <span class="mini-buttons">
          <button type="button" id="select-all">all</button>
          <button type="button" id="deselect-all">none</button>
        </span>
      </div>
      <div id="tag-tree"></div>
    </div>

    <button type="button" id="run" class="run-btn">Run query</button>
    <div id="status" class="status"></div>

    <div id="results-card" class="card hidden">
      <div class="card-title row">
        Results
        <span class="mini-buttons">
          <button type="button" id="dl-summary" title="Download per-district CSV">summary.csv</button>
          <button type="button" id="dl-matches" title="Download all matching locations CSV">matches.csv</button>
        </span>
      </div>
      <div id="summary-stats" class="summary-stats"></div>
      <div class="table-wrap">
        <table id="district-table">
          <thead>
            <tr>
              <th data-sort="name">District</th>
              <th data-sort="matches" class="num">match</th>
              <th data-sort="count" class="num">total</th>
              <th data-sort="fraction" class="num sort-active">%</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </aside>

  <main id="main">
    <div id="map"></div>
    <div id="legend" class="legend"></div>
    <div id="district-panel" class="district-panel hidden"></div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="app.js"></script>
</body>
</html>
